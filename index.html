<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Indie+Flower&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Questrial&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        body{
            background: url("https://img.freepik.com/free-vector/subtle-rombus-white-gray-pattern-background_1017-25098.jpg?semt=ais_hybrid&w=740&q=80");
            background-size: cover;
        }
        .container{
            padding: 40px;
            width: 500px;
            height: auto;
            margin-top: 70px;
            background: url("https://static.vecteezy.com/system/resources/thumbnails/019/939/781/small/subtle-deep-blue-gradient-background-free-vector.jpg");
            background-size: cover;
            color: white;
            font-family: Funnel Display, sans;
            border-radius: 40px;
            text-align: center;
        }
        .container:hover{
            box-shadow: 0 0 4px 5px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.5s;
        }
        #logo{
            width: 130px;
            height: 130px;
        }

    </style>
</head>
<body>
    <div class="container">
        <img src="https://files.orangeapps.ph/disk001/School_Files/1/school-65/school_profile/1724046681-141.png" alt="" id="logo">
        <br>
        <h1><b>Login</b></h1>
        <br>
        <details ontoggle="help()">
        <summary>
            <u>Need Help?</u>
        </summary>
        <br>
        <i id="help"></i>
        </details>
        <br><br>
        <form action="#">
            <label for="name">Username:</label>
            <br>
            <input type="text" class="form-control" id="name" placeholder="Enter Username..." required>
            <br>
            <label for="pass">Password:</label>
            <br>
            <input type="password" class="form-control" id="pass" placeholder="Enter Password..." required>
            <br>
            <label for="address">Email Address:</label>
            <br>
            <input type="email" class="form-control" id="address" placeholder="Enter Email Address...">
            <br><br>
            <input type="checkbox" class="form-check-input" id="case" name="case" value="checked">
            <label for="case" id="checkboxID" class="form-check-label">Stay Logged In</label>
            <p id="display" class="fst-italic text-warning"></p>
            <br>
            <button class="btn" onclick="logging_in()" type="button" style="background-color: rgb(79, 75, 197);" id="loginBTN">Log In</button>
            <button class="btn" type="reset" style="background-color: rgb(41, 40, 85);">Reset All</button>
        </form>
    </details>
    </div>

    <script>
        let attempt_counter = 0;

        function logging_in() {
        const authenticate = document.getElementById("checkboxID").checked;
        let Username = document.getElementById("name").value;
        let Password = document.getElementById("pass").value;
        let Email = document.getElementById("address").value;
        let granted = "Welcome " + Username;
        let denied = "Sorry. You have reached the max number of attempts. Locking log-in";

        while (attempt_counter < 3) {
        if (Username === "HelloIam20yrsold" && Password === "45397925" && Email === "burgers@gmail.com") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "notebooks.html";
            break; // stop loop
        } else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }

        }
        // lock after max attempts
        if (attempt_counter >= 3) {
            alert(denied);
            document.getElementById("loginBTN").disabled = true; // disable button
        }
        }

        function help() {
            document.getElementById("help").innerHTML = "Fill out to log in to your account.";
        }

    </script>
</body>
</html>
